<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>안내문</title>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #f4f4f4;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 10px;
    }

    h2 {
      text-align: center;
      margin: 20px 0;
    }

    .card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 15px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .card img {
      width: 100%;
      display: block;
    }

    .caption {
      padding: 10px;
      font-size: 14px;
      text-align: center;
      color: #333;
    }

    /* 클릭 확대 효과 */
    .card img:active {
      transform: scale(1.02);
      transition: 0.2s;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>📢 2026 항존직</h2>

  <div class="card">
    <img src="1.png" alt="안내1">
    <div class="caption">안내 1</div>
  </div>

  <div class="card">
    <img src="2.png" alt="안내2">
    <div class="caption">안내 2</div>
  </div>

  <div class="card">
    <img src="3.png" alt="안내3">
    <div class="caption">안내 3</div>
  </div>

  <div class="card">
    <img src="4.png" alt="안내4">
    <div class="caption">안내 4</div>
  </div>

</div>

</body>
</html>
